{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <div class="card" style="text-align: center;">
        <h2><i class="fa-solid fa-user-plus" style="color: var(--primary);"></i> Join ExamPrep</h2>
        <p>Start organizing your study time effectively.</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group" style="text-align: left;">
                <label for="username">Choose a Username</label>
                <input type="text" id="username" name="username" required placeholder="Pick something unique">
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Make it strong">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Create Account</button>
        </form>
        
        <p class="mt-1" style="font-size: 0.9rem;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
